global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lancamentos-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['lancamentos-api:8080']

  - job_name: 'consolidado-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['consolidado-api:8080']
